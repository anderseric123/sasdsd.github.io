<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>期交所动态监控</title>
    <!-- 引入 Tailwind CSS CDN 以保持样式完全一致 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隐藏滚动条但保留滚动功能 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* 适配底部安全区 */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-[#F5F5F5] font-sans text-gray-900 pb-safe">
    <div class="max-w-md mx-auto shadow-xl overflow-hidden relative min-h-screen bg-[#F5F5F5]">
        
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-4 py-3 flex items-center justify-between">
            <h1 class="text-[17px] font-semibold tracking-tight">期交所动态</h1>
            <button class="relative p-1.5 text-gray-600 hover:text-gray-900 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
            </button>
        </header>

        <!-- Core Metrics -->
        <section class="px-4 py-4 bg-white mb-2">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-xs font-medium text-gray-500 uppercase tracking-wider">今日监控概览</h2>
                <!-- 原生 JS 倒计时容器 -->
                <span id="refresh-countdown" class="text-[10px] text-gray-400 flex items-center">
                    <svg class="w-3 h-3 mr-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    60s 后刷新
                </span>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-[#F8FAFC] rounded-lg p-3 border border-slate-100">
                    <div id="metric-total" class="text-2xl font-semibold text-slate-800 mb-0.5 font-mono tracking-tight">0</div>
                    <div class="text-[11px] text-slate-500">监控动态</div>
                </div>
                <div class="bg-[#FEF2F2] rounded-lg p-3 border border-red-50">
                    <div id="metric-rule" class="text-2xl font-semibold text-red-600 mb-0.5 font-mono tracking-tight">0</div>
                    <div class="text-[11px] text-red-500">规则变动</div>
                </div>
                <div class="bg-[#F8FAFC] rounded-lg p-3 border border-slate-100">
                    <div id="metric-important" class="text-2xl font-semibold text-slate-800 mb-0.5 font-mono tracking-tight">0</div>
                    <div class="text-[11px] text-slate-500">重点动态</div>
                </div>
            </div>
        </section>

        <!-- Exchange Tabs -->
        <section class="bg-white sticky top-[53px] z-40 border-b border-gray-100">
            <div id="exchange-tabs" class="flex overflow-x-auto hide-scrollbar px-4 space-x-5"></div>
        </section>

        <!-- Category Filters -->
        <section class="px-4 py-3 flex space-x-2 overflow-x-auto hide-scrollbar bg-white" id="category-tabs"></section>

        <!-- List -->
        <section class="bg-white border-t border-gray-100 min-h-[50vh]">
            <div id="list-container" class="divide-y divide-gray-100"></div>
        </section>
    </div>

    <script>
        // --- 数据定义 ---
        const EXCHANGES = ['全部', '大商所', '上期所', '中金所', '广期所', '上期能源'];

        const CATEGORIES = [
            { id: 'all', label: '全部' },
            { id: 'notice', label: '公告通知' },
            { id: 'rule', label: '规则变动' },
            { id: 'holiday', label: '休市安排' },
            { id: 'regulator', label: '监管措施' },
            { id: 'delivery', label: '交割结算' },
        ];

        const MONITOR_DATA = [
            {
                id: 1, exchange: '上期所', title: '关于开展部分期货、期权品种做市商招募工作的通知',
                summary: '上期所发布部分期货、期权品种做市商招募通知，事项范围及报名安排以公告原文为准。',
                products: ['做市商'], date: '2026-04-01', effectiveTime: '以官网公告为准',
                type: 'notice', typeLabel: '公告通知', url: 'https://www.shfe.com.cn/publicnotice/notice/202604/t20260401_831013.html', important: true,
            },
            {
                id: 2, exchange: '上期所', title: '关于2026年清明节期间有关工作安排的通知',
                summary: '上期所发布2026年清明节期间交易安排，涵盖休市、夜盘及节后开市时间。',
                products: ['全品种'], date: '2026-03-31', effectiveTime: '清明节前后',
                type: 'holiday', typeLabel: '休市安排', url: 'https://www.shfe.com.cn/publicnotice/notice/202603/t20260331_830986.html', important: true,
            },
            {
                id: 3, exchange: '上期所', title: '关于对部分客户采取限制开仓监管措施的公告',
                summary: '上期所披露限制开仓监管措施，涉及对象、品种及执行安排以公告内容为准。',
                products: ['监管'], date: '2026-03-31', effectiveTime: '公告发布后',
                type: 'regulator', typeLabel: '监管措施', url: 'https://www.shfe.com.cn/publicnotice/notice/202603/t20260331_831001.html', important: true,
            },
            {
                id: 4, exchange: '上期所', title: '章程及交易规则',
                summary: '上期所章程及交易规则汇总页，收录交易规则及相关制度文本。',
                products: ['规则'], date: '2026-03-31', effectiveTime: '持续有效',
                type: 'rule', typeLabel: '规则变动', url: 'https://www.shfe.com.cn/regulation/exchangerules/rules/', important: false,
            },
            {
                id: 5, exchange: '上期能源', title: '关于2026年清明节期间有关工作安排的通知',
                summary: '上期能源发布2026年清明节期间交易安排，内容涉及休市与开市时间。',
                products: ['原油', '集运'], date: '2026-03-31', effectiveTime: '清明节前后',
                type: 'holiday', typeLabel: '休市安排', url: 'https://www.ine.cn/publicnotice/notice/202603/t20260331_830985.html', important: true,
            },
            {
                id: 6, exchange: '上期能源', title: '关于原油期货丰富可交割油种的公告',
                summary: '上期能源公告涉及原油期货可交割油种扩容，交割范围调整以原文表述为准。',
                products: ['原油'], date: '2026-03-27', effectiveTime: '按公告执行',
                type: 'rule', typeLabel: '规则变动', url: 'https://www.ine.cn/publicnotice/notice/202603/t20260327_830954.html', important: true,
            },
            {
                id: 7, exchange: '上期能源', title: '关于对部分客户采取限制开仓监管措施的公告',
                summary: '上期能源披露限制开仓监管措施，涉及客户范围及执行时间见公告原文。',
                products: ['监管'], date: '2026-03-31', effectiveTime: '公告发布后',
                type: 'regulator', typeLabel: '监管措施', url: 'https://www.ine.cn/publicnotice/notice/202603/t20260331_831002.html', important: true,
            },
            {
                id: 8, exchange: '中金所', title: '关于2026年部分节假日休市安排的通知',
                summary: '中金所发布2026年部分节假日休市安排，覆盖全年主要休市时段。',
                products: ['股指', '国债'], date: '2025-12-17', effectiveTime: '2026全年',
                type: 'holiday', typeLabel: '休市安排', url: 'https://www.cffex.com.cn/jystz/20251217/46425.html', important: false,
            },
            {
                id: 9, exchange: '中金所', title: '交易所规则',
                summary: '中金所交易所规则汇总页，包含交易规则、结算细则及风控制度。',
                products: ['规则'], date: '2026-01-09', effectiveTime: '持续有效',
                type: 'rule', typeLabel: '规则变动', url: 'https://www.cffex.com.cn/jysgz/', important: false,
            },
            {
                id: 10, exchange: '中金所', title: '关于增加5年期国债期货合约可交割国债的通知',
                summary: '中金所发布5年期国债期货合约可交割国债调整通知，交割券范围见通知原文。',
                products: ['5年期国债'], date: '2026-01-28', effectiveTime: '按通知执行',
                type: 'delivery', typeLabel: '交割结算', url: 'https://www.cffex.com.cn/jystz/', important: false,
            },
            {
                id: 11, exchange: '广期所', title: '关于2025年国庆节、中秋节假期前后调整相关期货合约涨跌停板幅度和交易保证金标准的通知',
                summary: '广期所发布节假日前后交易参数调整通知，涉及涨跌停板幅度及保证金标准。',
                products: ['工业硅', '碳酸锂'], date: '2025-09-25', effectiveTime: '节前后',
                type: 'notice', typeLabel: '公告通知', url: 'https://www.gfex.com.cn/gfex/tzts/list_yw.shtml', important: false,
            },
            {
                id: 12, exchange: '广期所', title: '广期所出台自律管理规则 全面加强程序化交易监管',
                summary: '广期所发布程序化交易监管相关自律管理规则，规则适用范围以官网披露为准。',
                products: ['程序化交易'], date: '2025-08-08', effectiveTime: '规则发布后',
                type: 'rule', typeLabel: '规则变动', url: 'https://www.gfex.com.cn/', important: true,
            },
            {
                id: 13, exchange: '大商所', title: '关于2026年清明节期间交易时间安排的通知',
                summary: '大商所发布2026年清明节期间交易时间安排，涉及休市及夜盘安排。',
                products: ['全品种'], date: '2026-03-26', effectiveTime: '清明节前后',
                type: 'holiday', typeLabel: '休市安排', url: 'https://www.dce.com.cn/', important: true,
            },
            {
                id: 14, exchange: '大商所', title: '焦炭、焦煤、铁矿石相关业务细则更新',
                summary: '大商所更新焦炭、焦煤、铁矿石相关业务细则，修改内容及施行合约见规则文件。',
                products: ['焦炭', '焦煤', '铁矿石'], date: '2025-01-24', effectiveTime: 'J2604 等合约起',
                type: 'rule', typeLabel: '规则变动', url: 'https://www.dce.com.cn/dalianshangpin/fgfz/6142914/6142926/6263837/%E5%A4%A7%E8%BF%9E%E5%95%86%E5%93%81%E4%BA%A4%E6%98%93%E6%89%80%E7%84%A6%E7%82%AD%E6%9C%9F%E8%B4%A7%E4%B8%9A%E5%8A%A1%E7%BB%86%E5%88%99%EF%BC%88%E6%A0%B9%E6%8D%AE2025%E5%B9%B41%E6%9C%8824%E6%97%A5%E3%80%942025%E3%80%956%E5%8F%B7%E6%96%87%E4%BB%B6%E4%BF%AE%E6%94%B9%EF%BC%89.pdf', important: true,
            }
        ];

        // --- 状态管理 ---
        let activeExchange = '全部';
        let activeCategory = 'all';

        // --- 渲染逻辑 ---
        function renderExchanges() {
            const container = document.getElementById('exchange-tabs');
            container.innerHTML = EXCHANGES.map(ex => `
                <button
                    onclick="setActiveExchange('${ex}')"
                    class="whitespace-nowrap text-[14px] font-medium transition-colors py-3 relative ${activeExchange === ex ? 'text-blue-600' : 'text-gray-500'}"
                >
                    ${ex}
                    ${activeExchange === ex ? '<span class="absolute bottom-0 left-1/2 -translate-x-1/2 w-4 h-0.5 bg-blue-600 rounded-t-full"></span>' : ''}
                </button>
            `).join('');
        }

        function renderCategories() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = CATEGORIES.map(cat => `
                <button
                    onclick="setActiveCategory('${cat.id}')"
                    class="whitespace-nowrap px-3 py-1.5 rounded-md text-[12px] font-medium transition-colors ${activeCategory === cat.id ? 'bg-slate-800 text-white' : 'bg-slate-50 text-slate-600 border border-slate-200/60'}"
                >
                    ${cat.label}
                </button>
            `).join('');
        }

        function renderList() {
            const container = document.getElementById('list-container');
            const filteredData = MONITOR_DATA.filter(item => {
                if (activeExchange !== '全部' && item.exchange !== activeExchange) return false;
                if (activeCategory !== 'all' && item.type !== activeCategory) return false;
                return true;
            });

            if (filteredData.length > 0) {
                container.innerHTML = filteredData.map(item => {
                    const typeClass = item.type === 'rule' ? 'text-red-700 bg-red-50' :
                                      item.type === 'regulator' ? 'text-amber-700 bg-amber-50' :
                                      item.type === 'delivery' ? 'text-emerald-700 bg-emerald-50' :
                                      item.type === 'holiday' ? 'text-indigo-700 bg-indigo-50' :
                                      'text-blue-700 bg-blue-50';
                    
                    const importantTag = item.important ? `
                        <span class="flex items-center text-[10px] font-medium px-1.5 py-0.5 rounded-sm bg-red-50 text-red-600 border border-red-100/50">
                            <svg class="w-3 h-3 mr-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            重要
                        </span>
                    ` : '';

                    const productsHtml = item.products.map(p => `
                        <span class="text-[10px] px-1.5 py-0.5 rounded border border-slate-200 text-slate-500 bg-white">${p}</span>
                    `).join('');

                    return `
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="block px-4 py-4 hover:bg-slate-50 active:bg-slate-50 transition-colors group">
                            <div class="flex items-start justify-between mb-2">
                                <div class="flex items-center space-x-2">
                                    <span class="text-[11px] font-medium px-1.5 py-0.5 rounded-sm bg-slate-100 text-slate-600">${item.exchange}</span>
                                    <span class="text-[11px] px-1.5 py-0.5 rounded-sm font-medium ${typeClass}">${item.typeLabel}</span>
                                    ${importantTag}
                                </div>
                                <span class="text-[11px] text-slate-400 font-mono">发布: ${item.date}</span>
                            </div>
                            
                            <h3 class="text-[15px] leading-snug font-medium text-slate-900 mb-2.5 group-hover:text-blue-600 transition-colors line-clamp-2">
                                ${item.title}
                            </h3>

                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center space-x-1.5">
                                    ${productsHtml}
                                </div>
                                <div class="flex items-center text-[11px] font-medium text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded-sm border border-indigo-100/50">
                                    <svg class="w-3 h-3 mr-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                    生效: ${item.effectiveTime}
                                </div>
                            </div>

                            <div class="text-[13px] text-slate-600 leading-relaxed mb-3 bg-[#F8FAFC] p-2.5 rounded-md border border-slate-100 flex items-start">
                                <svg class="w-3.5 h-3.5 text-amber-500 mr-1.5 mt-0.5 shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                                <span>${item.summary}</span>
                            </div>
                            
                            <div class="flex items-center justify-end">
                                <div class="flex items-center text-[11px] text-slate-400 group-hover:text-blue-600 transition-colors">
                                    查看原文 
                                    <svg class="w-3.5 h-3.5 ml-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');
            } else {
                container.innerHTML = `
                    <div class="py-16 flex flex-col items-center justify-center text-slate-400">
                        <div class="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center mb-3">
                            <svg class="w-5 h-5 text-slate-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        </div>
                        <span class="text-[13px]">暂无相关动态</span>
                    </div>
                `;
            }
        }

        function renderMetrics() {
            const total = MONITOR_DATA.length;
            const ruleCount = MONITOR_DATA.filter(item => item.type === 'rule').length;
            const importantCount = MONITOR_DATA.filter(item => item.important).length;
            document.getElementById('metric-total').textContent = total;
            document.getElementById('metric-rule').textContent = ruleCount;
            document.getElementById('metric-important').textContent = importantCount;
        }

        // --- 交互事件 ---
        window.setActiveExchange = function(ex) {
            activeExchange = ex;
            renderExchanges();
            renderList();
        };

        window.setActiveCategory = function(cat) {
            activeCategory = cat;
            renderCategories();
            renderList();
        };

        // --- 原生 JS 倒计时逻辑 ---
        function initCountdown() {
            let countdown = 60;
            const countdownEl = document.getElementById('refresh-countdown');
            
            setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    countdown = 60;
                    // 这里可以加入真实的刷新逻辑，例如 fetch 新数据
                }
                countdownEl.innerHTML = `
                    <svg class="w-3 h-3 mr-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    ${countdown}s 后刷新
                `;
            }, 1000);
        }

        // --- 初始化 ---
        renderMetrics();
        renderExchanges();
        renderCategories();
        renderList();
        initCountdown();
    </script>
</body>
</html>
