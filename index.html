<html lang="zh-CN">
<head>

    :root {
      --brand: #ff5a00;
      --brand2: #ff7a1a;
      --text: #161616;
      --sub: #666;

      --line: #eeeeee;
      --bg: #f7f8fa;
      --card: #ffffff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: #eef0f3;
      color: var(--text);
    }

    .page {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
      overflow: hidden;
      border-radius: 14px 14px 0 0;
      padding-bottom: 96px;
    }

    .topbar {
      height: 64px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border-bottom: 1px solid #f3f3f3;
    }

    .logo {
      height: 24px;
      display: flex;
      align-items: center;
      gap: 0;
    }

    .logo img {
      display: block;
      height: 20px;
      width: auto;
    }

    .topbar-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fff7ef 0%, #ffe0c8 100%);
      border: 1px solid rgba(255, 90, 0, .14);
      color: #b84a00;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .8px;
      box-shadow: 0 6px 16px rgba(255, 90, 0, .08);
      white-space: nowrap;
    }

    .topbar-tag::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 0 4px rgba(255, 90, 0, .12);
      flex: 0 0 auto;
    }

    .topbar-tag span {
      display: inline-block;
      transform: translateY(-0.5px);
    }

    .hero {
      position: relative;
      height: 252px;
      padding: 34px 20px 20px;
      background:
        radial-gradient(circle at 85% 46%, rgba(255, 122, 26, 0.12), transparent 30%),
        linear-gradient(135deg, #ffffff 0%, #f7f9fc 100%);
      overflow: hidden;
    }

    .hero h1 {
      position: relative;
      z-index: 2;
      margin: 0;
      font-size: 34px;
      line-height: 1.16;
      font-weight: 950;
      letter-spacing: -1.5px;
    }

    .hero h1 span {
      color: var(--brand);
    }

    .hero .desc {
      position: relative;
      z-index: 2;
      width: 68%;
      margin: 16px 0 0;
      font-size: 15px;
      line-height: 1.65;
      color: #222;
      font-weight: 500;
    }

    .hero .slogan {
      position: relative;
      z-index: 2;
      margin-top: 18px;
      font-size: 15px;
      color: #a5a5a5;
      font-weight: 700;
    }

    .hero-visual {
      position: absolute;
      right: 6px;
      top: 70px;
      width: 160px;
      height: 150px;
      opacity: 0.95;
    }

    .glass-card {
      position: absolute;
      right: 0;
      top: 0;
      width: 118px;
      height: 90px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 16px 36px rgba(32, 64, 128, 0.12);
      border: 1px solid rgba(255,255,255,0.85);
      transform: rotate(2deg);
    }

    .bars {
      position: absolute;
      right: 22px;
      bottom: 18px;
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }

    .bar {
      width: 10px;
      border-radius: 8px 8px 0 0;
      background: var(--brand);
    }

    .bar:nth-child(1) { height: 28px; opacity: .45; }
    .bar:nth-child(2) { height: 46px; opacity: .65; }
    .bar:nth-child(3) { height: 64px; opacity: .9; }

    .trend {
      position: absolute;
      right: 18px;
      top: 28px;
      width: 72px;
      height: 34px;
      border-bottom: 3px solid var(--brand);
      border-right: 3px solid var(--brand);
      transform: skew(-18deg) rotate(-12deg);
      border-radius: 2px;
    }

    .magnifier {
      position: absolute;
      left: 4px;
      bottom: 6px;
      width: 72px;
      height: 72px;
      border: 8px solid rgba(115, 148, 190, .28);
      border-radius: 50%;
      background: rgba(255,255,255,.38);
    }

    .magnifier::after {
      content: "";
      position: absolute;
      width: 48px;
      height: 8px;
      background: rgba(115, 148, 190, .38);
      border-radius: 999px;
      right: -36px;
      bottom: -18px;
      transform: rotate(45deg);
    }

    .tabs-wrap {
      padding: 0 16px 12px;
      background: #fff;
    }

    .tabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 0;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      flex: 0 0 auto;
      padding: 7px 18px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      border: 1px solid #ddd;
      background: #fff;
      color: #222;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
      box-shadow: 0 6px 16px rgba(255,90,0,.22);
    }

    .carousel {
      padding: 0 0 10px 16px;
      background: #fff;
    }

    .carousel-track {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-right: 16px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }

    .carousel-track::-webkit-scrollbar {
      display: none;
    }

    .mini-card {
      flex: 0 0 142px;
      height: 78px;
      border-radius: 13px;
      overflow: hidden;
      position: relative;
      scroll-snap-align: start;
      background: linear-gradient(135deg, #333, #111);
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
    }

    .mini-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .mini-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.58));
    }

    .mini-title {
      position: absolute;
      left: 10px;
      bottom: 8px;
      z-index: 2;
      color: #fff;
      font-size: 15px;
      line-height: 1.15;
      font-weight: 900;
      width: 112px;
      text-shadow: 0 2px 8px rgba(0,0,0,.25);
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px 0 14px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #d5d5d5;
    }

    .dot.active {
      width: 23px;
      background: var(--brand);
    }

    .recommend {
      margin: 0 16px 14px;
      min-height: 54px;
      border: 1px solid #f0f0f0;
      border-radius: 15px;
      display: flex;
      align-items: center;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 6px 16px rgba(0,0,0,.025);
    }

    .recommend-label {
      height: 100%;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff3ec;
      color: #222;
      font-size: 15px;
      font-weight: 900;
      border-right: 1px solid #f4e0d6;
    }

    .recommend-label span {
      color: var(--brand);
      font-size: 22px;
    }

    .recommend-text {
      flex: 1;
      padding: 0 12px;
      font-size: 13px;
      line-height: 1.35;
      color: #333;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: normal;
    }

    .recommend-shield {
      padding-right: 14px;
      color: #ddd;
      font-size: 20px;
    }

    .grid {
      padding: 0 16px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 12px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #f0f0f0;
      box-shadow: 0 5px 16px rgba(0,0,0,.035);
    }

    .thumb {
      height: 94px;
      background: linear-gradient(135deg, #f4f4f4, #e8e8e8);
      overflow: hidden;
      position: relative;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .thumb-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 12px;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 950;
      color: #fff;
      background: linear-gradient(135deg, #222, #555);
    }

    .card-body {
      padding: 10px 10px 12px;
      min-height: 98px;
      position: relative;
    }

    .card-title {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.35;
      margin-bottom: 6px;
      color: #202020;
    }

    .card-desc {
      font-size: 12px;
      line-height: 1.45;
      color: #909090;
      padding-right: 2px;
      min-height: 34px;
    }

    .view-btn {
      margin-top: 8px;
      float: right;
      border: 0;
      background: var(--brand);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
    }

    .bottom-actions {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100%, 430px);
      z-index: 40;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      border-top: 1px solid #e8e8e8;
      box-shadow: 0 -5px 20px -5px rgba(0,0,0,.12);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    }

    .bottom-actions-inner {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .share-page-btn,
    .download-btn {
      flex: 1;
      height: 44px;
      border-radius: 12px;
      border: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s ease, filter .15s ease;
    }

    .share-page-btn {
      display: none;
      background: #111827;
      color: #f5c35b;
      border: 1px solid rgba(245,195,91,.35);
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .download-btn {
      background: linear-gradient(90deg, #d4a62a 0%, #f4d47b 50%, #d4a62a 100%);
      color: #111827;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(212,166,42,.22);
      flex-direction: column;
      gap: 1px;
    }

    .download-btn .primary {
      font-size: 14px;
      line-height: 1;
    }

    .download-btn .secondary {
      font-size: 10px;
      line-height: 1;
      opacity: .78;
      transform: scale(.92);
    }

    .share-page-btn:active,
    .download-btn:active {
      transform: scale(.98);
    }

    .share-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
    }

    .share-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .risk {
      text-align: center;
      color: #b8b8b8;
      font-size: 12px;
      padding: 0 0 18px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,.88);
      display: none;
      align-items: stretch;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-inner {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .modal-top {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      color: #fff;
      flex: 0 0 auto;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 12px;
    }

    .close {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.35);
      color: #fff;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
    }

    .modal-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
    }

    .modal-scroll img {
      width: 100%;
      border-radius: 12px;
      display: block;
      background: #fff;
    }

    .modal-fallback {
      min-height: 720px;
      border-radius: 14px;
      background: #fff;
      padding: 40px 24px;
      color: #111;
      font-size: 28px;
      font-weight: 950;
      line-height: 1.25;
    }

    @media (max-width: 380px) {
      .hero h1 {
        font-size: 30px;
      }
      .hero .desc {
        width: 70%;
        font-size: 14px;
      }
      .hero-visual {
        width: 142px;
        right: -4px;
      }
      .grid {
        gap: 12px 10px;
      }
      .thumb {
        height: 86px;
      }
      .open-btn {
        padding: 10px 16px;
      }
      .phone {
        right: 92px;
      }
    }
  </style>
</head>

    const cardItems = cards.map((item, index) => ({
      ...item,
      uid: `${item.category}-${index}`,
    }));

    let currentCategory = "全部";

    const tabsEl = document.getElementById("tabs");
    const gridEl = document.getElementById("grid");
    const carouselEl = document.getElementById("carousel");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalContent = document.getElementById("modalContent");

    function renderTabs() {
      tabsEl.innerHTML = categories.map(cat => `
        <button class="tab ${cat === currentCategory ? "active" : ""}" data-cat="${cat}">
          ${cat}
        </button>
      `).join("");

      document.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => {
          currentCategory = btn.dataset.cat;
          renderTabs();
          renderGrid();
        });
      });
    }

    function filteredCards() {
      if (currentCategory === "全部") return cardItems;
      return cardItems.filter(item => item.category === currentCategory);
    }

    function imageWithFallback(item, className = "") {
      return `
        <img src="${item.image}" alt="${item.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="thumb-fallback" style="display:none;">${item.title}</div>
      `;
    }

    function renderCarousel() {
      const featured = cardItems.slice(0, 6);
      carouselEl.innerHTML = featured.map(item => `
        <div class="mini-card" onclick="openModal('${item.uid}')">
          ${imageWithFallback(item)}
          <div class="mini-title">${item.title}</div>
        </div>
      `).join("");
    }

    function renderGrid() {
      const list = filteredCards();
      gridEl.innerHTML = list.map(item => `
        <article class="card">
          <div class="thumb">
            ${imageWithFallback(item)}
          </div>
          <div class="card-body">
            <div class="card-title">${item.title}</div>
            <div class="card-desc">${item.desc}</div>
            <button class="view-btn" onclick="openModal('${item.uid}')">查看长图</button>
          </div>
        </article>
      `).join("");
    }

    function openModal(uid) {
      const item = cardItems.find(card => card.uid === uid);
      if (!item) return;

      modalTitle.textContent = item.title;
      modalContent.innerHTML = `
        <img src="${item.longImage}" alt="${item.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div class="modal-fallback" style="display:none;">
          ${item.title}<br><br>
          段子归段子，数据要认真看。
        </div>
      `;
      modal.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    document.getElementById("closeModal").addEventListener("click", () => {
      modal.classList.remove("show");
      document.body.style.overflow = "";
    });

    modal.addEventListener("click", e => {
      if (e.target === modal) {
        modal.classList.remove("show");
        document.body.style.overflow = "";
      }
    });

    function handleSharePage() {
      if (typeof window.Jin10JSBridge !== "undefined") {
        try {
          const bridge = new window.Jin10JSBridge();
          if (bridge.isApp) {
            bridge.dispatch("appShare", { url: location.href });
          }
        } catch (e) {}
      }
    }

    function initAppEnvironment() {
      const downloadBtn = document.getElementById("download-btn");
      const shareBtn = document.getElementById("sharePageBtn");

      if (typeof window.Jin10JSBridge !== "undefined") {
        try {
          const bridge = new window.Jin10JSBridge();

          if (bridge.isApp) {
            if (shareBtn) shareBtn.style.display = "flex";
            if (downloadBtn) downloadBtn.style.display = "none";
          }
        } catch (e) {
          if (downloadBtn) downloadBtn.style.display = "flex";
        }
      }

      if (downloadBtn && downloadBtn.style.display !== "none") {
        downloadBtn.style.display = "flex";
      }

      if (shareBtn) {
        shareBtn.addEventListener("click", handleSharePage);
      }
    }

    document.addEventListener("DOMContentLoaded", initAppEnvironment);

    renderTabs();
    renderCarousel();
    renderGrid();
  </script>
