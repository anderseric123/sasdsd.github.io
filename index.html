        const DATA_ANCHOR = new Date('2026-04-02T00:00:00');

        function parseDate(dateStr) {
            return new Date(`${dateStr}T00:00:00`);
        }

        function sortByDateDesc(list) {
            return [...list].sort((a, b) => {
                const levelOrder = { high: 3, medium: 2, low: 1 };
                const aWeight = levelOrder[a.impactLevel] || 0;
                const bWeight = levelOrder[b.impactLevel] || 0;
                if (aWeight !== bWeight) return bWeight - aWeight;
                return parseDate(b.publishDate) - parseDate(a.publishDate) || b.id - a.id;
            });
        }

        function isWithinRange(item) {
            const itemDate = parseDate(item.publishDate);
            if (activeRange === 'all') return true;
            if (activeRange === 'custom') {
                if (customStart && itemDate < parseDate(customStart)) return false;
                if (customEnd && itemDate > parseDate(customEnd)) return false;
                return true;
            }
            const map = { '7d': 7, '30d': 30, '90d': 90, '365d': 365 };
            const days = map[activeRange];
            if (!days) return true;
            const start = new Date(DATA_ANCHOR);
            start.setDate(start.getDate() - (days - 1));
            return itemDate >= start && itemDate <= DATA_ANCHOR;
        }

        function getBaseData() {
            return sortByDateDesc(TRACKER_DATA.filter(item => {
                if (activeProductGroup !== 'all' && item.productGroup !== activeProductGroup) return false;

                if (!isWithinRange(item)) return false;
                return true;
            }));
        }

                customEnd = '';
                document.getElementById('custom-start').value = '';
                document.getElementById('custom-end').value = '';
            }
            renderAll();
        };

        window.focusMetric = function(metricType) {
            if (metricType === 'high') {
                activeImpactLevel = 'high';
                activeStatus = 'all';
                activeImpactType = 'all';
                renderAll();
            } else if (metricType === 'active') {
                activeImpactLevel = 'all';
                activeStatus = 'active';
                activeImpactType = 'all';
                renderAll();
            } else if (metricType === 'tomorrow') {
                activeImpactLevel = 'all';
                activeStatus = 'tomorrow';
                activeImpactType = 'all';
                renderAll();
            } else {
                activeImpactLevel = 'all';
                activeStatus = 'all';
                renderAll();
            }
            scrollToList();
        };

        function initCountdown() {
            return;
        }

        function bindRangeActions() {
            document.getElementById('filter-toggle').addEventListener('click', () => {
                isFilterPanelOpen = !isFilterPanelOpen;
                renderFilterSummary();
            });
            document.getElementById('apply-custom-range').addEventListener('click', () => {
                const startValue = document.getElementById('custom-start').value;
                const endValue = document.getElementById('custom-end').value;
                customStart = startValue;
                customEnd = endValue;
                if (customStart && customEnd && parseDate(customStart) > parseDate(customEnd)) {
                    const temp = customStart;
                    customStart = customEnd;
                    customEnd = temp;
                    document.getElementById('custom-start').value = customStart;
                    document.getElementById('custom-end').value = customEnd;
                }
                activeRange = 'custom';
                isFilterPanelOpen = false;
                renderAll();
            });

            document.getElementById('reset-range').addEventListener('click', () => {
                activeRange = 'all';
                customStart = '';
                customEnd = '';
                document.getElementById('custom-start').value = '';
                document.getElementById('custom-end').value = '';
                isFilterPanelOpen = false;
                renderAll();
            });
        }

        bindRangeActions();
        renderAll();
        initCountdown();
    </script>
</body>
</html>
